<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cream background -->
  <rect width="32" height="32" rx="7" fill="#f5f3ec"/>
  <!-- V shape -->
  <path d="M4 8 L10 24 L16 8" stroke="#0d0c0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Heartbeat line threading through V -->
  <path d="M2 16 L8 16 L10 10 L12 22 L14 16 L18 16" stroke="#888" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small pulse dot at end -->
  <circle cx="18" cy="16" r="1.5" fill="#888"/>
</svg>
