name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed
            in 7 days if no further activity occurs.
          stale-pr-message: >
            This PR has been inactive for 14 days and will be closed
            in 7 days if no further activity occurs.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-close: 7
